<script>
(function () {
    var mq = window.matchMedia ? window.matchMedia('(prefers-reduced-motion: reduce)') : null;
    var reduced = mq ? mq.matches : false;

    function activate() {
        var items = Array.prototype.slice.call(document.querySelectorAll('[data-reveal]'));
        if (!items.length) return;

        if (reduced || typeof window.IntersectionObserver === 'undefined') {
            items.forEach(function (el) { el.classList.add('is-visible'); });
            return;
        }

        var observer = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
                if (!entry.isIntersecting) return;
                entry.target.classList.add('is-visible');
                observer.unobserve(entry.target);
            });
        }, {
            threshold: 0,
            rootMargin: '0px 0px -6% 0px'
        });

        items.forEach(function (el, idx) {
            if (!el.style.getPropertyValue('--reveal-delay')) {
                el.style.setProperty('--reveal-delay', (idx * 0.06).toFixed(2) + 's');
            }
            if (!el.classList.contains('ws-motion-reveal')) {
                el.classList.add('ws-motion-reveal', 'ws-motion-reveal--rise');
            }
            observer.observe(el);
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', activate, { once: true });
    } else {
        activate();
    }
})();
</script>
